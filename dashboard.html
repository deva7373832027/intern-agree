<!DOCTYPE html>
<html>
<head>
    <title>Application Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }
        .dashboard-header {
            margin-bottom: 30px;
        }
        .dashboard-header h1 {
            color: #0066cc;
            margin-bottom: 10px;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 {
            color: #666;
            margin: 0 0 10px 0;
            font-size: 0.9em;
            text-transform: uppercase;
            font-weight: 500;
        }
        .stat-card .value {
            font-size: 2.5em;
            color: #0066cc;
            font-weight: bold;
        }
        .applications-section {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .applications-section h2 {
            color: #0066cc;
            margin-bottom: 20px;
        }
        .apps-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .apps-table thead {
            background: #f5f5f5;
        }
        .apps-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }
        .apps-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .apps-table tbody tr:hover {
            background: #f9f9f9;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .status-accepted {
            background: #d4edda;
            color: #155724;
        }
        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }
        .no-apps {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .btn-back:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-container">
            <button class="btn-back" onclick="window.location.href='index.html'">← Back to Home</button>
            
            <div class="dashboard-header">
                <h1>📊 Application Dashboard</h1>
                <p>Track all your internship applications</p>
            </div>

            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3>Total Applications</h3>
                    <div class="value" id="totalApps">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending</h3>
                    <div class="value" id="pendingApps">0</div>
                </div>
                <div class="stat-card">
                    <h3>Accepted</h3>
                    <div class="value" id="acceptedApps">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Stipend</h3>
                    <div class="value" id="budgetTotal">₹0</div>
                </div>
            </div>

            <div class="applications-section">
                <h2>Your Applications</h2>
                <div id="applications-container">
                    <!-- Applications table will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.onload = function() {
            renderDashboard();
            updateStats();
        };

        function updateStats() {
            const apps = getApplications();
            document.getElementById('totalApps').innerText = apps.length;
            
            const pending = apps.filter(a => a.status === 'Pending').length;
            document.getElementById('pendingApps').innerText = pending;
            
            const accepted = apps.filter(a => a.status === 'Accepted').length;
            document.getElementById('acceptedApps').innerText = accepted;
        }
    </script>
</body>
</html>
